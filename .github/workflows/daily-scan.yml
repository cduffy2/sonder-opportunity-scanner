name: Weekly Opportunity Scan

on:
  schedule:
    - cron: '0 7 * * 3'   # 07:00 UTC, every Wednesday
  workflow_dispatch:          # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Needed to commit seen-opportunities.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build
        run: npm run build

      - name: Run opportunity scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: npm start

      - name: Commit updated seen-opportunities.json
        run: |
          git config user.name "opportunity-scanner[bot]"
          git config user.email "bot@sonder.noreply"
          git fetch origin main
          # Merge remote seen list with local (union of both sets)
          node -e "
            const fs = require('fs');
            const local = JSON.parse(fs.readFileSync('data/seen-opportunities.json', 'utf-8'));
            const remote = JSON.parse(require('child_process').execSync('git show origin/main:data/seen-opportunities.json').toString());
            const merged = [...new Set([...remote, ...local])];
            fs.writeFileSync('data/seen-opportunities.json', JSON.stringify(merged, null, 2));
          "
          git add data/seen-opportunities.json
          git diff --staged --quiet || git commit -m "chore: update seen opportunities [skip ci]"
          git push
